# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
            
          - os: ubuntu-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: clang
            
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl     
            
    steps:
    - uses: actions/checkout@v4
    
    - name: Install raylib dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev

    - name: Clone and build raylib (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        git clone --depth 1 https://github.com/raysan5/raylib.git raylib_src
        mkdir raylib_src/build && cd raylib_src/build
        cmake .. -DBUILD_EXAMPLES=OFF -DBUILD_GAMES=OFF -DCMAKE_BUILD_TYPE=Release
        make
        sudo make install

    - name: Clone and build raylib (Windows)

      if: matrix.os == 'windows-latest'

      shell: bash

      run: |

        git clone --depth 1 https://github.com/raysan5/raylib.git raylib_src
          cmake -S raylib_src -B raylib_src/build \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_GAMES=OFF \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/raylib_install
        
        cmake --build raylib_src/build --config Release --target install
        
        echo "RAYLIB_PATH=$GITHUB_WORKSPACE/raylib_install/lib/cmake/raylib" >> $GITHUB_ENV

    - name: Install raylib (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install raylib
    
    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"


    - name: Install latest CMake
      uses: lukka/get-cmake@latest 
      
    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -Draylib_DIR=${{ env.RAYLIB_PATH }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Add OS to filename
      shell: bash
      run: |
        BUILD_DIR="${{ steps.strings.outputs.build-output-dir }}"
        
        echo "Searching in: $BUILD_DIR"
        
        if [ -f "$BUILD_DIR/Release/particleSim.exe" ]; then
          cp "$BUILD_DIR/Release/particleSim.exe" "particleSim-${{ matrix.os }}.exe"
        
        elif [ -f "$BUILD_DIR/particleSim.exe" ]; then
          cp "$BUILD_DIR/particleSim.exe" "particleSim-${{ matrix.os }}.exe"
        
        elif [ -f "$BUILD_DIR/particleSim" ]; then
          cp "$BUILD_DIR/particleSim" "particleSim-${{ matrix.os }}"
        else
          ls -R "$BUILD_DIR"
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: particle-sim-${{ matrix.os }}-${{ matrix.cpp_compiler }}
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/*.exe
          ${{ steps.strings.outputs.build-output-dir }}/particleSim
          ${{ steps.strings.outputs.build-output-dir }}/Release/*.exe

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: particleSim-${{ matrix.os }}*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
        
    # - name: Test
    #   working-directory: ${{ steps.strings.outputs.build-output-dir }}
    #   # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
    #   # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
    #   run: ctest --build-config ${{ matrix.build_type }}
